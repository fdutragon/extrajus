<svg
  width="512"
  height="512"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="chromeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#fefce8" />
      <stop offset="40%" stopColor="#fde047" />
      <stop offset="80%" stopColor="#eab308" />
      <stop offset="100%" stopColor="#ca8a04" />
    </linearGradient>
  </defs>

  <!-- Fundo escuro fixo -->
  <rect width="100" height="100" fill="#09090b" />
  
  <!-- Logo redimensionado para ter bastante respiro (12% do bg) e levemente deslocado para cima -->
  <g transform="translate(44, 40) scale(0.12)">
    <!-- Outer Hexagon Brackets -->
    <path 
      d="M 42,14 L 16,30 L 16,70 L 42,86" 
      fill="none" 
      stroke="#eab308" 
      stroke-width="4" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    <path 
      d="M 58,14 L 84,30 L 84,70 L 58,86" 
      fill="none" 
      stroke="#eab308" 
      stroke-width="4" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />

    <!-- Inner Data Brackets -->
    <path 
      d="M 46,32 L 33,40 L 33,60 L 46,68" 
      fill="none" 
      stroke="#eab308" 
      stroke-width="1.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      opacity="0.4"
    />
    <path 
      d="M 54,32 L 67,40 L 67,60 L 54,68" 
      fill="none" 
      stroke="#eab308" 
      stroke-width="1.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      opacity="0.4"
    />

    <!-- The Core -->
    <circle 
      cx="50" 
      cy="50" 
      r="4.5" 
      fill="#facc15" 
    />
  </g>
</svg>
